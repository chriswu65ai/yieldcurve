name: Data refresh

on:
  workflow_dispatch: {}
  schedule:
    # Weekdays (UTC). Adjust as desired.
    - cron: "25 2 * * 1-5"

permissions:
  contents: write

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update data JSON
        run: npm run data:update

      - name: Commit changes (if any)
        run: |
          if git status --porcelain public/data | grep .; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data
            git commit -m "chore(data): refresh yield curve snapshots"
            git push
          else
            echo "No data changes."
          fi

